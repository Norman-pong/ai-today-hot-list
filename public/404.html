<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>今日热榜 - 页面重定向</title>
  <script type="text/javascript">
    // GitHub Pages SPA 支持
    // 当直接访问子路由时，GitHub Pages 会返回 404
    // 这个页面将路径信息保存到 sessionStorage，然后重定向到首页
    // 首页脚本会读取并恢复原始路径
    
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    
    // 提取仓库名（例如 /today-hot-list/）
    const segmentCount = 1; // 根据仓库名层级调整，如果是 username.github.io/repo-name/ 则为 1
    
    // 保存完整 URL 到 sessionStorage
    const fullPath = path + search + hash;
    sessionStorage.setItem('github-pages-redirect', fullPath);
    
    // 重定向到首页
    const basePath = path.split('/').slice(0, 1 + segmentCount).join('/');
    window.location.replace(basePath + '/');
  </script>
</head>
<body>
  <p>页面重定向中...</p>
</body>
</html>
